name: CI

# The mechanical enforcement of the tests-green gate (CODING-PROJECT-PLAN §5).
# A red pipeline blocks merge. Every step here mirrors a `npm run` script so the
# same checks run locally and in CI.
on:
  push:
    branches: [main]
    # Docs-only merges skip this post-merge re-run — and with it the staging
    # deploy, which fires only on a successful CI workflow_run for a push to
    # main (N82). PRs are NOT filtered: the pull_request trigger below runs the
    # full gate on every change, docs included, so a docs-only main commit's
    # green evidence is its PR run. Scoped deliberately — packages/help-content
    # ships Markdown into the app bundle (D111), so only clearly non-shipped
    # paths are ignored; `*.md` matches root-level files only (single `*` does
    # not cross `/`).
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".claude/**"
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify gate
    runs-on: ubuntu-latest
    # Least-privilege token: the gate only reads the repo (checkout, npm). Declaring
    # the scope explicitly stops the job inheriting the broader default token
    # (CodeQL actions/missing-workflow-permissions, OFC-152).
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      # The Firestore emulator runs on the JVM (used by the emulator test step).
      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Format + lint (Biome)
        run: npm run check

      - name: Token layer in sync (D29)
        run: npm run assert:tokens

      - name: Type-check
        run: npm run typecheck

      - name: Build (libs, SPA, API)
        run: npm run build

      # After the build, so it hashes the SHIPPED apps/web/dist/index.html (what
      # the browser enforces the CSP against), not just the source (OFC-146 review).
      - name: CSP inline-script hashes in sync (D107/OFC-148)
        run: npm run assert:csp-hashes

      - name: DevIdentityProvider absent from prod bundle (D108)
        run: npm run assert:no-dev-provider

      - name: Bundle-size budget (D74)
        run: npm run check:bundle-size

      - name: Unit / integration tests
        run: npm run test

      - name: Emulator integration tests
        run: npm run test:emulator

      - name: End-to-end + accessibility (Playwright + axe)
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
