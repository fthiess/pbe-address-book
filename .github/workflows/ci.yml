name: CI

# The mechanical enforcement of the tests-green gate (CODING-PROJECT-PLAN §5).
# A red pipeline blocks merge. Every step here mirrors a `npm run` script so the
# same checks run locally and in CI.
#
# PULL REQUESTS ONLY — this is the single authoritative run of the gate (D143).
# GitHub builds the pull_request event from the merge *result* (the branch merged
# into its base), and branch protection requires this check `strict` (branches
# up to date before merging, N91), so the tree verified here is the tree that
# lands on main. A post-merge re-run on main would replay a known-green result
# against an identical tree, so it was removed; the staging deploy now triggers
# on the push to main directly instead of waiting on a CI `workflow_run`
# (amends N82 — the docs-only skip it described now lives on that push trigger).
on:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify gate
    runs-on: ubuntu-latest
    # Least-privilege token: the gate only reads the repo (checkout, npm). Declaring
    # the scope explicitly stops the job inheriting the broader default token
    # (CodeQL actions/missing-workflow-permissions, OFC-152).
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      # The Firestore emulator runs on the JVM (used by the emulator test step).
      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      # First gate step, before the Playwright download: this workflow and
      # package.json's verify:gate must list the same npm-run steps in the same
      # order, or a guard can silently run on only one side (D141/OFC-297 —
      # assert:no-session-replay did exactly that in 7a-2). The guard is itself
      # in both lists, so deleting it from either one fails the other.
      - name: Gate lists in sync (D141/OFC-297)
        run: npm run assert:gate-in-sync

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Format + lint (Biome)
        run: npm run check

      - name: Token layer in sync (D29)
        run: npm run assert:tokens

      - name: USER-MANUAL §10 in sync with the help registry (N118)
        run: npm run assert:help-manual

      - name: Type-check
        run: npm run typecheck

      - name: Build (libs, SPA, API)
        run: npm run build

      # After the build, so it hashes the SHIPPED apps/web/dist/index.html (what
      # the browser enforces the CSP against), not just the source (OFC-146 review).
      - name: CSP inline-script hashes in sync (D107/OFC-148)
        run: npm run assert:csp-hashes

      - name: DevIdentityProvider absent from prod bundle (D108)
        run: npm run assert:no-dev-provider

      # Also after the build, for the same reason as the CSP hashes above: it reads
      # the shipped chunks in apps/web/dist/assets.
      - name: Session-replay recorder absent from SPA bundle (D138/D140)
        run: npm run assert:no-session-replay

      - name: Bundle-size budget (D74)
        run: npm run check:bundle-size

      - name: Unit / integration tests
        run: npm run test

      - name: Emulator integration tests
        run: npm run test:emulator

      - name: End-to-end + accessibility (Playwright + axe)
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
