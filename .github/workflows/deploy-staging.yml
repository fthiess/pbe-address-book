name: Deploy staging

# Keyless deploy of the Book API (Cloud Run) + Firebase Hosting to the staging
# environment, gated on a green test gate. It does NOT trigger on push directly:
# it waits for the CI workflow to SUCCEED on main, so a red main is never
# deployed (CODING-PROJECT-PLAN §5 — the gate guards the deploy too).
#
# Auth is via Workload Identity Federation (infra/setup-wif.sh) — GitHub mints a
# short-lived OIDC token Google trusts only for this repo. There is no JSON key
# anywhere in the repo or its secrets, which is essential: this repo is PUBLIC.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Manual re-deploy (e.g. after a config change with no new commit, or to kick
  # the very first deploy before the workflow_run trigger has registered).
  workflow_dispatch:

# Never run two deploys at once; a deploy in flight should finish, not be cancelled.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    # Deploy only when CI passed on a push to main — or on a manual dispatch.
    # The workflow_run payload carries the conclusion, branch, and triggering event.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ( github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push' )

    permissions:
      contents: read
      id-token: write # required for the WIF OIDC token exchange

    steps:
      # Check out the exact commit CI validated (workflow_run defaults to the
      # branch tip, which may have moved). Falls back to the ref for dispatch.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # Load the environment's values from the single source of truth shared with
      # the provisioning scripts (infra/environments/staging.env, OFC-84) so this
      # workflow no longer hardcodes project/region/SA/bucket/Ghost values inline.
      # `tr -d '\r'` guards against CRLF; the grep skips comments and blank lines.
      # A prod deploy workflow points at environments/prod.env instead.
      - name: Load staging environment
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' infra/environments/staging.env | tr -d '\r' >> "$GITHUB_ENV"

      # Build the SPA FIRST — it needs no cloud auth, and doing the slow work
      # before authenticating keeps the gap between auth and the deploys short.
      # @pbe/shared must compile before the SPA build (vite resolves the
      # workspace package to its built dist/).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared libs + SPA
        run: |
          npm run build:libs
          npm run build:web

      # Authenticate LAST-minute: the auth action bakes GitHub's short-lived OIDC
      # token into the ADC credential file statically, so the deploys must run
      # soon after this step — not behind a multi-minute build.
      - name: Authenticate to Google Cloud (keyless, WIF)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      # Run the Firebase CLI under Node 20: under Node 24 google-auth-library's STS
      # token exchange dies with "Premature close" (undici), so the WIF credential
      # never resolves. Node 20's HTTP stack handles it. The SPA was already built
      # on Node 24 above; firebase-tools has no native deps, so this is safe.
      - name: Use Node 20 for the Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Firebase reads the ADC file via google-auth-library (no FIREBASE_TOKEN, no
      # key). --project is explicit because .firebaserc's default is the emulator.
      # firestore:rules ships the deny-all backstop (firestore.rules) on every
      # deploy so the enforced policy always matches the repo (needs the deployer's
      # firebaserules.admin role — see infra/setup-wif.sh).
      - name: Deploy Firebase Hosting + Firestore rules
        run: npx firebase deploy --only hosting,firestore:rules --project "$PROJECT_ID" --non-interactive

      # Re-seed staging so its data is always a pure function of the deployed code
      # — the same clean-replace discipline as the seed scripts themselves, made
      # automatic so staging can never drift from the generator (the failure that
      # bit us when the fixture names changed but staging was never re-seeded).
      # Runs BEFORE the Cloud Run deploy so the new revision cold-starts and
      # hydrates the freshly-seeded data (and re-indexes the tester's email). It
      # runs on the Node-20 step above, where google-auth-library's STS exchange
      # works (the Node-24 undici bug that the Firebase pin dodges).
      #
      # TOGGLE: set the repository variable STAGING_AUTOSEED=false to skip this —
      # e.g. during Phase-8 UAT, when real testers' in-progress state on staging
      # should survive a deploy. Unset (the default) means "seed on every deploy".
      # Needs the deployer SA's roles/datastore.user (Firestore) + storage.admin
      # (the image bucket) — see infra/setup-wif.sh.
      - name: Re-seed staging (data + images)
        if: vars.STAGING_AUTOSEED != 'false'
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.PROJECT_ID }}
          IMAGE_BUCKET: ${{ env.IMAGE_BUCKET }}
          STAGING_TESTER_EMAIL: ${{ secrets.STAGING_TESTER_EMAIL }}
        run: |
          npm run seed:staging --workspace tools/fake-data
          npm run seed:staging-images --workspace tools/fake-data
          if [ -n "$STAGING_TESTER_EMAIL" ]; then
            npm run link:staging-tester --workspace tools/fake-data
          else
            echo "STAGING_TESTER_EMAIL secret not set — skipping tester link."
          fi

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Reconcile the image bucket's IAM + versioning + lifecycle on every deploy so
      # the live bucket can't drift from infra/provision-staging.sh. The deploy path
      # only ran `gcloud run deploy`, so a provisioning change that lived solely in
      # the script (the 4c-1 runtime-SA upgrade objectViewer→objectAdmin, and the D94
      # versioning + 90-day noncurrent lifecycle) never reached staging — the runtime
      # SA couldn't WRITE headshots and every upload 500'd. Idempotent; needs the
      # deployer's storage.admin (already granted, infra/setup-wif.sh). A prod deploy
      # workflow should carry the same step.
      - name: Reconcile image bucket (IAM + versioning + lifecycle, D94/N42)
        run: |
          gcloud storage buckets add-iam-policy-binding "gs://$IMAGE_BUCKET" \
            --member="serviceAccount:$RUNTIME_SA" --role="roles/storage.objectAdmin" --quiet
          gcloud storage buckets update "gs://$IMAGE_BUCKET" --versioning
          printf '%s' '{ "rule": [ { "action": { "type": "Delete" }, "condition": { "daysSinceNoncurrentTime": 90 } } ] }' > /tmp/img-lifecycle.json
          gcloud storage buckets update "gs://$IMAGE_BUCKET" --lifecycle-file=/tmp/img-lifecycle.json

      # API last: gcloud only needs the token briefly to SUBMIT the Cloud Build
      # (the build then runs server-side as the build SA), so it tolerates the
      # slightly older token. Same flags as the provisioning playbook (D83
      # scale-to-zero, D126 image bucket, fake-data staging --allow-unauthenticated).
      #
      # The Ghost auth-bridge config (Phase 1b) rides here because --set-env-vars
      # REPLACES the whole env set on each deploy; GHOST_BRIDGE_TARGET=staging
      # makes the live relay route staging sign-ins to the staging callback (D72).
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$REGION" \
            --service-account "$RUNTIME_SA" \
            --max-instances 1 --min-instances 0 \
            --memory 1Gi \
            --set-env-vars "IMAGE_BUCKET=$IMAGE_BUCKET,GHOST_JWKS_URL=$GHOST_JWKS_URL,GHOST_JWT_ISSUER=$GHOST_JWT_ISSUER,GHOST_JWT_AUDIENCE=$GHOST_JWT_AUDIENCE,GHOST_BRIDGE_URL=$GHOST_BRIDGE_URL,GHOST_BRIDGE_TARGET=$GHOST_BRIDGE_TARGET" \
            --allow-unauthenticated \
            --quiet
