<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBE Address Book</title>
    <!-- No-FOUC theme: set the .dark class before React paints, from the saved
         preference or the OS setting (D30). -->
    <script>
      try {
        var saved = localStorage.getItem("book-theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {
        /* localStorage unavailable — fall back to the light default. */
      }
    </script>
    <!-- No-FOUC font size: set the root font-size before React paints, from the
         saved preference (PRD §5.3). Normal is the key's absence. The percentages
         MUST match SCALE_PERCENT in src/lib/fontScale.ts. -->
    <script>
      try {
        var size = localStorage.getItem("book-font-size");
        var pct = size === "large" ? "112.5%" : size === "larger" ? "125%" : null;
        if (pct) {
          document.documentElement.style.fontSize = pct;
        }
      } catch (e) {
        /* localStorage unavailable — fall back to the default size. */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
